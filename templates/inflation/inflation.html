<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфляция в России</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'inflation/style.css' %}">
</head>
<body>
{#    <div class="button-right">#}
{#        <a href="/income/" class="btn btn-outline-secondary">Перейти к доходам</a>#}
{#    </div>#}

    <div class="container mt-4">
        <h1 class="mb-4">Данные об инфляции в России</h1>

        <div class="row mb-4">
            <div class="col">
                <button id="updateBtn" class="btn btn-success">Получить данные с Росстата</button>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5>Фильтры</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <select id="yearSelect" class="form-select">
                            <option value="">Все годы</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select id="monthSelect" class="form-select">
                            <option value="">Все месяцы</option>
                            <option value="1">Январь</option>
                            <option value="2">Февраль</option>
                            <option value="3">Март</option>
                            <option value="4">Апрель</option>
                            <option value="5">Май</option>
                            <option value="6">Июнь</option>
                            <option value="7">Июль</option>
                            <option value="8">Август</option>
                            <option value="9">Сентябрь</option>
                            <option value="10">Октябрь</option>
                            <option value="11">Ноябрь</option>
                            <option value="12">Декабрь</option>
                            <option value="13">Годовая</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button id="filterBtn" class="btn btn-primary w-100">Применить фильтр</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Данные из БД</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Год</th>
                                <th>Месяц</th>
                                <th>Инфляция (%)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr>
                                <td colspan="3" class="text-center">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Загрузка данных при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            loadYears();
            loadData();
        });

        // Загрузка списка годов
        function loadYears() {
            fetch('/api/years/')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('yearSelect');
                    data.years.forEach(year => {
                        const option = document.createElement('option');
                        option.value = year;
                        option.textContent = year;
                        select.appendChild(option);
                    });
                });
        }

        // Загрузка данных
        function loadData() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;

            let url = '/api/data/';
            const params = new URLSearchParams();
            if (year) params.append('year', year);
            if (month) params.append('month', month);
            if (params.toString()) url += '?' + params.toString();

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('dataTable');
                    if (data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Нет данных</td></tr>';
                    } else {
                        tbody.innerHTML = data.data.map(item => `
                            <tr>
                                <td>${item.year}</td>
                                <td>${item.month}</td>
                                <td>${item.inflation_value}%</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        // Применить фильтр
        document.getElementById('filterBtn').addEventListener('click', loadData);

        // Обновление данных
        document.getElementById('updateBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Обновление...';

            fetch('/api/update/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    loadYears();  // Перезагружаем список годов
                    loadData();   // Перезагружаем данные
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Получить данные с Росстата';
            });
        });
    </script>
</body>
</html>
