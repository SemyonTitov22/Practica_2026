<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Численность медицинских кадров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'inflation/style.css' %}">
</head>
<body>
    <div class="container mt-3">
        <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-outline-primary">← На главную</a>
        </div>
    </div>

    <div class="container mt-4">
        <h1 class="mb-4">Численность медицинских кадров в г. Москве</h1>

        <div class="row mb-4">
            <div class="col">
                <button id="updateBtn" class="btn btn-success">Получить данные с Росстата</button>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5>Выбор данных и фильтр</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <select id="personnelTypeSelect" class="form-select mb-3">
                            <option value="doctors">Врачи</option>
                            <option value="nursing">Средний медперсонал</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="valueTypeSelect" class="form-select mb-3">
                            <option value="total">Абсолютное значение</option>
                            <option value="per_10000">На 10000 человек</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="yearSelect" class="form-select">
                            <option value="">Все годы</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <button id="filterBtn" class="btn btn-primary">Применить фильтр</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Данные из БД</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Год</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr>
                                <td colspan="2" class="text-center">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadYears();
            loadData();
        });

        function loadYears() {
            fetch('/api/medical/years/')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('yearSelect');
                    data.years.forEach(year => {
                        const option = document.createElement('option');
                        option.value = year;
                        option.textContent = year;
                        select.appendChild(option);
                    });
                });
        }

        function loadData() {
            const year = document.getElementById('yearSelect').value;
            const personnelType = document.getElementById('personnelTypeSelect').value;
            const valueType = document.getElementById('valueTypeSelect').value;

            let url = `/api/medical/data/?personnel_type=${personnelType}&value_type=${valueType}`;
            if (year) url += `&year=${year}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('dataTable');
                    if (data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="2" class="text-center">Нет данных</td></tr>';
                    } else {
                        tbody.innerHTML = data.data.map(item => `
                            <tr>
                                <td>${item.year}</td>
                                <td>${item.value}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        document.getElementById('filterBtn').addEventListener('click', loadData);
        document.getElementById('personnelTypeSelect').addEventListener('change', loadData);
        document.getElementById('valueTypeSelect').addEventListener('change', loadData);

        document.getElementById('updateBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Обновление...';

            fetch('/api/medical/update/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    loadYears();
                    loadData();
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Получить данные с Росстата';
            });
        });
    </script>
</body>
</html>
