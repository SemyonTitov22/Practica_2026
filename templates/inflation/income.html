<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доходы и расходы Москвы</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Доходы и расходы населения г. Москвы</h1>

        <div class="row mb-4">
            <div class="col">
                <a href="/" class="btn btn-outline-primary">← Назад к инфляции</a>
            </div>
            <div class="col text-end">
                <button id="updateBtn" class="btn btn-success">Получить данные с Росстата</button>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5>Фильтр по году</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <select id="yearSelect" class="form-select">
                            <option value="">Все годы</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <button id="filterBtn" class="btn btn-primary">Применить фильтр</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h5>Данные из БД</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Показатель</th>
                                <th>Год</th>
                                <th>Значение</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr>
                                <td colspan="3" class="text-center">Загрузка данных...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadYears();
            loadData();
        });

        function loadYears() {
            fetch('/api/income/years/')
                .then(response => response.json())
                .then(data => {
                    const select = document.getElementById('yearSelect');
                    data.years.forEach(year => {
                        const option = document.createElement('option');
                        option.value = year;
                        option.textContent = year;
                        select.appendChild(option);
                    });
                });
        }

        function loadData() {
            const year = document.getElementById('yearSelect').value;
            const url = year ? `/api/income/data/?year=${year}` : '/api/income/data/';

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('dataTable');
                    if (data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" class="text-center">Нет данных</td></tr>';
                    } else {
                        tbody.innerHTML = data.data.map(item => `
                            <tr>
                                <td>${item.indicator}</td>
                                <td>${item.year}</td>
                                <td>${item.value}</td>
                            </tr>
                        `).join('');
                    }
                });
        }

        document.getElementById('filterBtn').addEventListener('click', loadData);

        document.getElementById('updateBtn').addEventListener('click', function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Обновление...';

            fetch('/api/income/update/', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
                if (data.success) {
                    loadYears();
                    loadData();
                }
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Получить данные с Росстата';
            });
        });
    </script>
</body>
</html>
